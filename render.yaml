# Render Account 1 Blueprint - Customer Storefront
# Target Domain: www.asaliswad.com

services:
  - type: web
    name: asaliswad-customer-storefront
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.x
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://api.asaliswad.com
      - key: NEXT_PUBLIC_API_URL
        value: https://api.asaliswad.com
